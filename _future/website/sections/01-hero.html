<!-- MasjidOS · Section 01 · Hero
     Elementor: HTML widget inside its own Section. Full-width preferred.
     Replace YOUR_WPORG_URL and YOUR_DEMO_URL -->
<div class="mos">
	<section class="mos-section mos-hero" aria-label="MasjidOS hero">
		<div class="mos-hero__plane" aria-hidden="true"></div>
		<div class="mos-hero__inner">
			<div class="mos-hero__copy">
				<div class="mos-hero__brand">
					<div class="mos-hero__mark" aria-hidden="true">
						<svg viewBox="0 0 24 24"><path d="M4 20h16M6 20V10l6-5 6 5v10M10 20v-5h4v5"></path></svg>
					</div>
					<div class="mos-hero__name">Masjid<span>OS</span></div>
				</div>
				<h1 class="mos-h">Your mosque, live in minutes</h1>
				<p class="mos-lede">Prayer times, Friday board, TV display, and notices — without coding or cloud lock-in.</p>
				<div class="mos-actions">
					<a class="mos-btn mos-btn--gold" href="YOUR_WPORG_URL">Install free</a>
					<a class="mos-btn mos-btn--ghost" href="YOUR_DEMO_URL">See live demo</a>
				</div>
			</div>
			<div class="mos-hero__visual" aria-hidden="true">
				<div class="mos-hero__board">
					<div class="mos-hero__board-top">
						<div>
							<strong>Madani Masjid</strong>
							<small>Dhaka · Asia/Dhaka</small>
						</div>
						<div class="mos-hero__hijri">22 Muharram 1448<br>Friday</div>
					</div>
					<div class="mos-hero__next">
						<small>Next prayer</small>
						<b>Maghrib</b>
						<div class="mos-hero__timer">01:24:18</div>
					</div>
					<div class="mos-hero__rows">
						<div class="mos-hero__row"><span>Fajr</span><span>4:18</span></div>
						<div class="mos-hero__row"><span>Dhuhr</span><span>12:01</span></div>
						<div class="mos-hero__row is-now"><span>Asr</span><span>4:12</span></div>
						<div class="mos-hero__row"><span>Maghrib</span><span>6:48</span></div>
						<div class="mos-hero__row"><span>Isha</span><span>8:15</span></div>
					</div>
				</div>
			</div>
		</div>
	</section>
</div>
